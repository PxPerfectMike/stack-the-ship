<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
	<!-- knobs the icon generator rewrites: bg rx, badge transform -->
	<rect id="bg" x="0" y="0" width="512" height="512" rx="0" fill="#3f88c5" />
	<g id="badge" transform="translate(256 259) scale(0.78)">
		<!-- rope from the crane, hook curl -->
		<rect x="-8" y="-262" width="16" height="122" rx="8" fill="#e8c15a" />
		<path d="M 0 -140 q 0 32 -28 32" stroke="#e8c15a" stroke-width="20" fill="none" stroke-linecap="round" />
		<!-- the crate -->
		<g transform="translate(0 16)">
			<rect x="-108" y="-108" width="216" height="216" rx="14" fill="#e3a857" />
			<line x1="-92" y1="-92" x2="92" y2="92" stroke="#f0bc6e" stroke-width="36" />
			<line x1="92" y1="-92" x2="-92" y2="92" stroke="#f0bc6e" stroke-width="36" />
			<rect x="-108" y="-108" width="216" height="216" rx="14" fill="none" stroke="#c98c3f" stroke-width="20" />
		</g>
		<!-- freeloading gull on the crate corner -->
		<g transform="translate(72 -110) scale(3.4)">
			<ellipse cx="0" cy="-8" rx="10" ry="7" fill="#f4f1e8" />
			<path d="M -1 -10 Q -13 -15 -17 -8 Q -9 -5 -1 -7 Z" fill="#cfd6da" />
			<circle cx="8" cy="-15" r="5.5" fill="#f4f1e8" />
			<circle cx="10.2" cy="-16" r="1.3" fill="#22262a" />
			<path d="M 13 -15.5 L 18.5 -14 L 13 -12.5 Z" fill="#f2a13c" />
		</g>
		<!-- sea -->
		<path
			d="M -168 196 q 24 -26 48 0 t 48 0 t 48 0 t 48 0 t 48 0 t 48 0 t 48 0"
			stroke="#f4f9fb"
			stroke-width="20"
			fill="none"
			stroke-linecap="round"
			opacity="0.95"
		/>
	</g>
</svg>
