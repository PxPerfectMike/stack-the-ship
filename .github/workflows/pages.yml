name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install, not ci: lockfiles written on Windows omit linux/wasm
      # optional deps (npm/cli#4828) and npm ci refuses to reconcile them
      - run: npm install --no-audit --no-fund
      - run: npm test
      - run: npm run check
      - name: Build site
        run: npm run build
        env:
          BASE_PATH: /stack-the-ship
      - name: SPA deep-link fallback
        run: cp build/index.html build/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build
      - id: deployment
        uses: actions/deploy-pages@v4
